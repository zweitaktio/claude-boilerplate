name: Test

on:
  workflow_call:
    inputs:
      context:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.context }}
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: ${{ inputs.context }}/yarn.lock

      - run: yarn --immutable
      - run: yarn test:run
