name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      image-tag: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
      - name: Short SHA
        id: sha
        run: echo "short=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/_test.yml
    with:
      context: ./backend

  # test-frontend:
  #   needs: changes
  #   if: needs.changes.outputs.frontend == 'true'
  #   uses: ./.github/workflows/_test.yml
  #   with:
  #     context: ./frontend

  build-backend:
    needs: [changes, test-backend]
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/_build.yml
    with:
      service: backend
      context: ./backend
      image: registry.example.com/myproject/backend  # Change to your registry
      tag: ${{ needs.changes.outputs.image-tag }}
    secrets: inherit

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/_build.yml
    with:
      service: frontend
      context: ./frontend
      image: registry.example.com/myproject/frontend  # Change to your registry
      tag: ${{ needs.changes.outputs.image-tag }}
    secrets: inherit

  update-env-backend:
    needs: [changes, build-backend, build-frontend]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.backend == 'true' }}
    uses: ./.github/workflows/_update-env.yml
    with:
      dokploy-compose-id: ${{ vars.DOKPLOY_COMPOSE_ID_STAGING_BACKEND }}
      image-tag: ${{ needs.changes.outputs.image-tag }}
    secrets: inherit

  update-env-frontend:
    needs: [changes, build-backend, build-frontend]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.frontend == 'true' }}
    uses: ./.github/workflows/_update-env.yml
    with:
      dokploy-compose-id: ${{ vars.DOKPLOY_COMPOSE_ID_STAGING_FRONTEND }}
      image-tag: ${{ needs.changes.outputs.image-tag }}
    secrets: inherit

  deploy-backend:
    needs: [changes, build-backend, build-frontend, update-env-backend, update-env-frontend]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.backend == 'true' }}
    uses: ./.github/workflows/_deploy.yml
    with:
      dokploy-compose-id: ${{ vars.DOKPLOY_COMPOSE_ID_STAGING_BACKEND }}
      title: ${{ needs.changes.outputs.image-tag }}
    secrets: inherit

  deploy-frontend:
    needs: [changes, build-backend, build-frontend, update-env-backend, update-env-frontend]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.frontend == 'true' }}
    uses: ./.github/workflows/_deploy.yml
    with:
      dokploy-compose-id: ${{ vars.DOKPLOY_COMPOSE_ID_STAGING_FRONTEND }}
      title: ${{ needs.changes.outputs.image-tag }}
    secrets: inherit

  verify-backend:
    needs: [changes, deploy-backend, deploy-frontend]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.backend == 'true' }}
    uses: ./.github/workflows/_verify-version.yml
    with:
      url: ${{ vars.STAGING_BACKEND_URL }}
      expected-tag: ${{ needs.changes.outputs.image-tag }}

  verify-frontend:
    needs: [changes, deploy-backend, deploy-frontend]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.frontend == 'true' }}
    uses: ./.github/workflows/_verify-version.yml
    with:
      url: ${{ vars.STAGING_FRONTEND_URL }}
      expected-tag: ${{ needs.changes.outputs.image-tag }}
      basic-auth: ${{ vars.STAGING_BASIC_AUTH }}
