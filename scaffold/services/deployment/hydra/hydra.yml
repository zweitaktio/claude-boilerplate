version: v2.3.0

serve:
  public:
    cors:
      enabled: true
      # Set via SERVE_PUBLIC_CORS_ALLOWED_ORIGINS env var
      allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Content-Type
        - Accept
  admin:
    cors:
      enabled: false

# URLs are set via environment variables:
# - URLS_SELF_ISSUER
# - URLS_CONSENT
# - URLS_LOGIN
# - URLS_LOGOUT
# - URLS_POST_LOGOUT_REDIRECT

oauth2:
  expose_internal_errors: false
  session:
    encrypt_at_rest: true

strategies:
  access_token: jwt
  scope: wildcard

ttl:
  access_token: 1h
  refresh_token: 720h  # 30 days
  id_token: 1h
  auth_code: 10m
  login_consent_request: 30m

# Secrets are set via environment variables:
# - SECRETS_SYSTEM
# - SECRETS_COOKIE

log:
  level: info
  format: json
  leak_sensitive_values: false
